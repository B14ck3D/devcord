# flux.ndevelopment.org — kopiuj do /etc/nginx/sites-available/flux.ndevelopment.org
# Statyczne pliki: /root/disc/front/dist (po npm run build w front/)
# Certbot dopisuje bloki SSL po: certbot --nginx -d flux.ndevelopment.org -d www.flux.ndevelopment.org
# Nginx (www-data) musi mieć +x na /root, /root/disc, /root/disc/front oraz odczyt dist — deploy/sync-frontend.sh ustawia.

server {
    listen 80;
    listen [::]:80;
    server_name flux.ndevelopment.org www.flux.ndevelopment.org;

    root /root/disc/front/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location /ws {
        proxy_pass http://127.0.0.1:23623;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /voice {
        proxy_pass http://127.0.0.1:23623;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:23623;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
