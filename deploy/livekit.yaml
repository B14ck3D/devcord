# Devcord VoiceKit — konfiguracja LiveKit SFU (upstream OSS).
# Uruchomienie: livekit-server --config /ścieżka/do/livekit.yaml --bind 127.0.0.1
# port: wewnętrzny HTTP LiveKit (nginx TLS na :7880 → proxy do 127.0.0.1:7882 — ten sam port nie może być użyty przez nginx i LiveKit naraz).

port: 7882

keys:
  devcord_key: devcord_secret

rtc:
  node_ip: 45.134.108.220
  port_range_start: 50000
  port_range_end: 60000
  tcp_port: 7881
  use_external_ip: true
  congestion_control:
    enabled: true
    allow_pause: false
    send_side_bandwidth_estimation: true
    expected_usage_threshold: 0.98

room:
  max_participants: 600
  empty_timeout: 300
  departure_timeout: 60
  enabled_codecs:
    - mime: video/H264
    - mime: video/AV1
    - mime: video/VP9
    - mime: video/VP8
    - mime: audio/opus

limit:
  num_tracks: 6000
  bytes_per_sec: 125000000
  subscription_limit_video: 4000
  subscription_limit_audio: 4000

video:
  dynacast_pause_delay: 0
  stream_tracker_manager:
    packet_tracker:
      max_bitrate: 50000000
